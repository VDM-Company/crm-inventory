services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm_inventory
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crm -d crm_inventory']
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  pgdata:
